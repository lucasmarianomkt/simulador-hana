  const VALOR_M2 = 530;
  const VALOR_PLACA = 50;
  const VALOR_ARGAMASSA_SACO = 50;
  const RENDIMENTO_ARGAMASSA = 4;
  const AREA_POR_PLACA = 0.09;
  const NUMERO_WHATSAPP = "5511972280407";
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyJA7PVj_PysQe7XlDMlgcvhEa1RrVljDY9Re4_VjH7ixVP-40UdetVjPamG1FXls__MA/exec";

  let simulacaoAtual = {
    tipo: "",
    area: 0,
    valorSeixo: 0,
    valorArgamassa: 0,
    total: 0,
    quantidadePlacas: 0,
    incluirArgamassa: false
  };

  const popup = shadow.getElementById('popup-simulador');
  const abrirBtn = shadow.getElementById('abrirPopup');
  const fecharBtn = shadow.getElementById('fecharPopup');
  const voltarBtn = shadow.getElementById('voltarSimulador');
  const enviarBtn = shadow.getElementById('botao_hana');

  const tabs = shadow.querySelectorAll('.tab-calculo');
  const tipoCalculoInput = shadow.getElementById('tipoCalculo');
  const camposM2 = shadow.getElementById('campos-m2');
  const camposMedidas = shadow.getElementById('campos-medidas');
  const camposPlacas = shadow.getElementById('campos-placas');
  const btnCalcular = shadow.getElementById('btnCalcular');
  const btnContinuarWhatsapp = shadow.getElementById('btnContinuarWhatsapp');
  const resultadoSimulacao = shadow.getElementById('resultadoSimulacao');

  function abrirPopup() {
    popup.classList.add('aberto');
  }

  function fecharPopup() {
    popup.classList.remove('aberto');
  }

  function voltarSimulador() {
    shadow.getElementById('etapa-formulario').style.display = 'none';
    shadow.getElementById('etapa-simulador').style.display = 'block';
  }

  function getUTM() {
    const p = new URLSearchParams(window.location.search);
    return {
      utm_source: p.get("utm_source") || "",
      utm_medium: p.get("utm_medium") || "",
      utm_campaign: p.get("utm_campaign") || "",
      utm_term: p.get("utm_term") || "",
      utm_content: p.get("utm_content") || ""
    };
  }

  function formatarMoeda(valor) {
    return valor.toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    });
  }

  abrirBtn.addEventListener('click', abrirPopup);
  fecharBtn.addEventListener('click', fecharPopup);
  voltarBtn.addEventListener('click', voltarSimulador);

  popup.addEventListener('click', function (e) {
    if (e.target === popup) {
      fecharPopup();
    }
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', function () {
      tabs.forEach(btn => btn.classList.remove('active'));
      this.classList.add('active');

      const tipo = this.dataset.tipo;
      tipoCalculoInput.value = tipo;

      camposM2.style.display = tipo === 'm2' ? 'block' : 'none';
      camposMedidas.style.display = tipo === 'medidas' ? 'block' : 'none';
      camposPlacas.style.display = tipo === 'placas' ? 'block' : 'none';
    });
  });

  btnCalcular.addEventListener('click', function () {
    const tipo = tipoCalculoInput.value;
    const incluirArgamassa = shadow.getElementById('incluirArgamassa').checked;

    let area = 0;
    let valorSeixo = 0;
    let tipoTexto = '';
    let quantidadePlacas = 0;

    if (tipo === 'm2') {
      area = parseFloat(shadow.getElementById('metroQuadrado').value) || 0;
      tipoTexto = 'Por m²';
      valorSeixo = area * VALOR_M2;
    }

    if (tipo === 'medidas') {
      const largura = parseFloat(shadow.getElementById('largura').value) || 0;
      const comprimento = parseFloat(shadow.getElementById('comprimento').value) || 0;
      area = largura * comprimento;
      tipoTexto = 'Por medidas';
      valorSeixo = area * VALOR_M2;
    }

    if (tipo === 'placas') {
      quantidadePlacas = parseInt(shadow.getElementById('quantidadePlacas').value) || 0;
      area = quantidadePlacas * AREA_POR_PLACA;
      tipoTexto = 'Por placas';
      valorSeixo = quantidadePlacas * VALOR_PLACA;
    }

    if (area <= 0) {
      alert('Preencha os campos corretamente para calcular.');
      return;
    }

    let valorArgamassa = 0;
    if (incluirArgamassa) {
      const sacos = Math.ceil(area / RENDIMENTO_ARGAMASSA);
      valorArgamassa = sacos * VALOR_ARGAMASSA_SACO;
    }

    const total = valorSeixo + valorArgamassa;

    simulacaoAtual = {
      tipo: tipoTexto,
      area: area,
      valorSeixo: valorSeixo,
      valorArgamassa: valorArgamassa,
      total: total,
      quantidadePlacas: quantidadePlacas,
      incluirArgamassa: incluirArgamassa
    };

    shadow.getElementById('resultadoTipo').textContent = tipoTexto;
    shadow.getElementById('resultadoArea').textContent = area.toFixed(2) + ' m²';
    shadow.getElementById('resultadoSeixo').textContent = formatarMoeda(valorSeixo);
    shadow.getElementById('resultadoArgamassa').textContent = formatarMoeda(valorArgamassa);
    shadow.getElementById('resultadoTotal').textContent = formatarMoeda(total);

    resultadoSimulacao.style.display = 'block';
    btnContinuarWhatsapp.style.display = 'block';
  });

  btnContinuarWhatsapp.addEventListener('click', function () {
    if (!simulacaoAtual.total) {
      alert('Faça a simulação antes de continuar.');
      return;
    }

    shadow.getElementById('etapa-simulador').style.display = 'none';
    shadow.getElementById('etapa-formulario').style.display = 'block';
  });

  shadow.getElementById('telefone').addEventListener('input', function (e) {
    let valor = e.target.value.replace(/\D/g, '').slice(0, 11);

    let formatado = '';
    if (valor.length > 0) {
      formatado = '(' + valor.substring(0, 2);
    }
    if (valor.length >= 3) {
      formatado += ') ' + valor.substring(2, 7);
    }
    if (valor.length >= 8) {
      formatado += '-' + valor.substring(7, 11);
    }

    e.target.value = formatado;
  });

  enviarBtn.addEventListener('click', function () {
    const nome = shadow.getElementById('nome').value.trim();
    const telefone = shadow.getElementById('telefone').value.trim();

    if (!nome || !telefone) {
      alert('Preencha nome e telefone');
      return;
    }

    const telefoneValido = /^\(\d{2}\)\s\d{5}-\d{4}$/.test(telefone);
    if (!telefoneValido) {
      alert('Telefone inválido. Use o formato (00) 00000-0000');
      return;
    }

    const telefoneLimpo = telefone.replace(/\\D/g, '');

    let detalhePlacas = '';
    if (simulacaoAtual.tipo === 'Por placas') {
      detalhePlacas = '\\nQuantidade de placas: ' + simulacaoAtual.quantidadePlacas;
    }

const mensagem =
  `Olá! Desejo receber mais informações sobre seixos e conhecer as opções disponíveis.

Nome: ${nome}
WhatsApp: ${telefone}
Tipo de cálculo: ${simulacaoAtual.tipo}
Área estimada: ${simulacaoAtual.area.toFixed(2)} m²${detalhePlacas}
Valor do seixo telado: ${formatarMoeda(simulacaoAtual.valorSeixo)}
Argamassa colante: ${formatarMoeda(simulacaoAtual.valorArgamassa)}
Total estimado: ${formatarMoeda(simulacaoAtual.total)}`;

    const dados = {
      momento: "",
      faturamento: "",
      segmento: "",
      responsabilidade: "",
      empresa: "",
      nome: nome,
      telefone: 'p:+55' + telefoneLimpo,
      tipo_calculo: simulacaoAtual.tipo,
      area_estimada: simulacaoAtual.area.toFixed(2),
      quantidade_placas: simulacaoAtual.quantidadePlacas || "",
      valor_seixo: simulacaoAtual.valorSeixo,
      valor_argamassa: simulacaoAtual.valorArgamassa,
      total_estimado: simulacaoAtual.total,
      incluir_argamassa: simulacaoAtual.incluirArgamassa ? "Sim" : "Não",
      ...getUTM()
    };

    window.open(
      'https://wa.me/' + NUMERO_WHATSAPP + '?text=' + encodeURIComponent(mensagem),
      '_blank'
    );

    fecharPopup();

    fetch(URL_SCRIPT, {
      method: 'POST',
      body: JSON.stringify(dados)
    }).catch(() => console.log('Erro ao enviar dados, mas WhatsApp abriu'));

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'lead_whatsapp',
      nome: nome,
      telefone: telefone,
      origem: 'popup_simulador',
      tipo_calculo: simulacaoAtual.tipo,
      total_estimado: simulacaoAtual.total




    });
  });
})();
